name: MERN CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run unit tests
        run: |
          cd backend
          node test.js


  build:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build


  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d

      - name: Wait for backend
        run: sleep 5

      - name: Test API
        run: curl "http://localhost:5000/add?a=2&b=3"