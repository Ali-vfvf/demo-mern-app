deploy_to_production:
  stage: deploy
  image: docker:24
  tags:
    - docker

  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts

  script:
  - |
    ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 $PROD_USER@$PROD_HOST << 'EOF'
      set -e

      mkdir -p ~/demo-mern-app/nginx

      cat > ~/demo-mern-app/docker-compose.yml << 'EOC'
      version: "3.9"

      services:

        backend:
          image: docker.io/alivfvf/mern-backend:latest
          container_name: mern-backend
          expose:
            - "5000"

        frontend:
          image: docker.io/alivfvf/mern-frontend:latest
          container_name: mern-frontend
          expose:
            - "80"
          depends_on:
            - backend

        nginx:
          image: nginx:alpine
          container_name: reverse-proxy
          ports:
            - "80:80"
          volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
          depends_on:
            - frontend
            - backend
      EOC

      cat > ~/demo-mern-app/nginx/nginx.conf << 'EON'
      server {
          listen 80;
          server_name _;

          location / {
              proxy_pass http://mern-frontend:80;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }

          location /api/ {
              proxy_pass http://mern-backend:5000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }
      }
      EON

      cd ~/demo-mern-app

      docker compose pull
      docker compose up -d --remove-orphans
    EOF