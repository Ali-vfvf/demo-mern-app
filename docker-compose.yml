version: "3.9"

services:

  backend:
    image: docker.io/alivfvf/mern-backend:latest
    container_name: mern-backend
    expose:
      - "5000"

  frontend:
    image: docker.io/alivfvf/mern-frontend:latest
    container_name: mern-frontend
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - /home/ubuntu/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
  
networks:
  default:
    name: mern-network