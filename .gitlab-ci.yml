stages:
  - build
  - deploy

# ✅ BUILD STAGE
build_images:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
  tags:
    - docker

  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

  script:
    - docker build -t $DOCKER_USERNAME/mern-backend:latest ./backend
    - docker build -t $DOCKER_USERNAME/mern-frontend:latest ./frontend
    - docker push $DOCKER_USERNAME/mern-backend:latest
    - docker push $DOCKER_USERNAME/mern-frontend:latest


# ✅ DEPLOY STAGE
deploy_to_production:
  stage: deploy
  image: docker:24
  tags:
    - docker

  before_script:
    - apk add --no-cache openssh-client git
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts

  script:
    - ssh -i ~/.ssh/id_ed25519 $PROD_USER@$PROD_HOST "
        set -e

        if [ ! -d ~/demo-mern-app/.git ]; then
          rm -rf ~/demo-mern-app
          git clone http://172.28.5.13/Ali-vfvf/gitlab-practice-app.git ~/demo-mern-app
        else
          cd ~/demo-mern-app
          git pull origin main
        fi

        cd ~/demo-mern-app

        docker compose down || true
        docker compose pull
        docker compose up -d --remove-orphans
      "