stages:
  - unit-tests
  - build
  - deploy

unit-tests:
  image: node:22
  stage: unit-tests
  script:
    - cd backend
    - npm install
    - node test.js

build:
  image: docker:24
  stage: build
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker compose build

deploy:
  image: docker:24
  stage: deploy
  script:
    - docker compose down
    - docker compose up -d --build