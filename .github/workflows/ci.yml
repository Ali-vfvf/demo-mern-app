name: Full CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # FRONTEND
      - name: Build frontend image
        run: docker build -t alivfvf/mern-frontend:latest ./frontend

      - name: Push frontend image
        run: docker push alivfvf/mern-frontend:latest

      # BACKEND
      - name: Build backend image
        run: docker build -t alivfvf/mern-backend:latest ./backend

      - name: Push backend image
        run: docker push alivfvf/mern-backend:latest


  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------- SETUP SSH KEY (FIXED) ----------------
      - name: Setup SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > $HOME/key.pem
          chmod 600 $HOME/key.pem

      # ---------------- COPY DOCKER COMPOSE ----------------
      - name: Copy docker-compose to server
        run: |
          scp -i $HOME/key.pem -o StrictHostKeyChecking=no \
          docker-compose.yml \
          ubuntu@${{ secrets.PROD_HOST }}:/home/ubuntu/docker-compose.yml

      # ---------------- COPY NGINX CONFIG ----------------
      - name: Copy nginx config to server
        run: |
          ssh -i $HOME/key.pem -o StrictHostKeyChecking=no \
          ubuntu@${{ secrets.PROD_HOST }} "mkdir -p /home/ubuntu/nginx"

          scp -i $HOME/key.pem -o StrictHostKeyChecking=no \
          nginx/nginx.conf \
          ubuntu@${{ secrets.PROD_HOST }}:/home/ubuntu/nginx/nginx.conf

      # ---------------- DEPLOY ----------------
      - name: Deploy via SSH
        run: |
          ssh -i $HOME/key.pem -o StrictHostKeyChecking=no \
          ubuntu@${{ secrets.PROD_HOST }} << 'EOF'

            cd /home/ubuntu

            echo "Stopping old containers..."
            docker compose down || true

            echo "Pulling latest images..."
            docker pull alivfvf/mern-frontend:latest
            docker pull alivfvf/mern-backend:latest

            echo "Starting new stack..."
            docker compose up -d --remove-orphans

            echo "Deployment complete 🚀"

          EOF